name: smart_landmarks
description: Smart Geo-Tagged Landmarks - CSE 489 Lab Exam

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client (like Retrofit in Android)
  http: ^1.2.0
  
  # Local Database (like Room in Android)
  sqflite: ^2.3.0
  path: ^1.8.3

  # State Management
  provider: ^6.1.1

  # Map (OpenStreetMap - no API key needed!)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # GPS Location
  geolocator: ^11.0.0
  
  # Image Picker (Photo Picker)
  image_picker: ^1.0.7

  # Network Check (offline detection)
  connectivity_plus: ^5.0.2

  # Image Caching
  cached_network_image: ^3.3.1

  # Date Formatting
  intl: ^0.19.0

  # Path Provider (for file storage)
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
